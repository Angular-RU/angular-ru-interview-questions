name: Deploy to Github Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEMOS_BASE_PATH: /demos
  DEMOS_REPOSITORY: Angular-RU/demos
  DEMOS_BRANCH: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy dist to Angular-RU/demos main branch
        env:
          TOKEN: ${{ secrets.ANGULAR_RU_BOT_PAT }}
        run: |
          cd dist
          git init
          git config user.name "angular-ru-bot"
          git config user.email "angular-ru@yandex.ru"
          git add .
          git commit -m "deploy: demos from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git branch -M main
          git remote add origin "https://x-access-token:${TOKEN}@github.com/Angular-RU/demos.git"
          git push --force origin main
