name: Deploy demos

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-demos
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEMOS_BASE_PATH: /demos
  DEMOS_REPOSITORY: Angular-RU/demos
  DEMOS_BRANCH: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build movies remote
        run: npm run build -w movies -- --configuration pages

      - name: Build ticket availability remote
        run: npm run build -w ticket-availability -- --configuration pages

      - name: Build movie ticket host
        run: npm run build -w movie-ticket -- --configuration pages

      - name: Prepare dist
        run: |
          cat > dist/index.html <<'EOF'
          <!doctype html>
          <html lang="ru">
            <head>
              <meta charset="utf-8">
              <title>Angular RU demos</title>
              <meta name="viewport" content="width=device-width, initial-scale=1">
            </head>
            <body>
              <h1>Angular RU demos</h1>

              <ul>
                <li>
                  <a href="./mfe/movie-ticket/">Micro Frontends: Movie Ticket</a>
                </li>
              </ul>
            </body>
          </html>
          EOF

      - name: Deploy dist to Angular-RU/demos main branch
        env:
          TOKEN: ${{ secrets.ANGULAR_RU_BOT_PAT }}
        run: |
          cd dist
          git init
          git config user.name "angular-ru-bot"
          git config user.email "angular-ru@yandex.ru"
          git add .
          git commit -m "deploy: demos from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git branch -M main
          git remote add origin "https://x-access-token:${TOKEN}@github.com/Angular-RU/demos.git"
          git push --force origin main
