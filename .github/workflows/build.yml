name: Build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format Node.js concurrency page
        run: npx prettier src/pages/nodejs-concurrency/index.md --write

      - name: Upload formatted Node.js concurrency page
        uses: actions/upload-artifact@v4
        with:
          name: formatted-nodejs-concurrency
          path: src/pages/nodejs-concurrency/index.md
          if-no-files-found: error

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build
