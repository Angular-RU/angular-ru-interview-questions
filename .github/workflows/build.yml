name: Build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/nodejs-concurrency-questions
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Merge questions into Node.js page
        run: |
          node --input-type=module <<'NODE'
          import {readFileSync, writeFileSync} from 'node:fs';

          const pagePath = 'src/pages/nodejs/index.md';
          const extraPath = 'src/pages/nodejs-concurrency/index.md';
          const marker = '### npm и package scripts';
          const extraStart = '### Основы многопоточности';

          const page = readFileSync(pagePath, 'utf8');
          const extraPage = readFileSync(extraPath, 'utf8');
          const startIndex = extraPage.indexOf(extraStart);

          if (!page.includes(marker) || startIndex === -1) {
            throw new Error('Не удалось найти место для вставки вопросов');
          }

          const extra = extraPage
            .slice(startIndex)
            .replace(extraStart, '### Многопоточность и синхронизация')
            .trim();
          const merged = page.replace(marker, `${extra}\n\n${marker}`);

          writeFileSync(pagePath, merged);
          NODE
          npx prettier src/pages/nodejs/index.md --write
          rm src/pages/nodejs-concurrency/index.md

      - name: Restore workflow
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/build.yml > .github/workflows/build.yml

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Commit merged page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build.yml src/pages/nodejs/index.md src/pages/nodejs-concurrency/index.md
          git commit -m "docs: move concurrency questions into Node.js page"
          git push origin HEAD:agent/nodejs-concurrency-questions
