<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <title>{{ title }}</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
        />
        <meta
            name="description"
            content="{{ description }}"
        />
        <link
            rel="stylesheet"
            href="{{ stylesheet }}"
        />
    </head>
    <body>
        <header class="site-header">
            <div class="container header-layout">
                <a
                    class="brand"
                    href="./"
                >
                    Angular RU Interview Questions
                </a>
                <nav
                    class="nav"
                    aria-label="Основная навигация"
                >
                    <a href="{{ questionsHref }}">Вопросы</a>
                    <a href="{{ examplesHref }}">Примеры</a>
                    <a href="{{ repositoryHref }}">GitHub</a>
                </nav>
            </div>
        </header>
        <main class="container">
            <section class="hero home-hero">
                <p class="eyebrow">Angular RU</p>
                <h1>Вопросы, ответы и практические примеры для собеседований</h1>
                <p class="lead">
                    Статический сайт собирает Markdown-разделы из questions и runnable-демо из examples в единый GitHub
                    Pages артефакт.
                </p>
                <div class="actions">
                    <a
                        class="button"
                        href="{{ questionsHref }}"
                    >
                        Открыть вопросы
                    </a>
                    <a
                        class="button button-secondary"
                        href="{{ examplesHref }}"
                    >
                        Открыть примеры
                    </a>
                </div>
            </section>
        </main>
    </body>
</html>
