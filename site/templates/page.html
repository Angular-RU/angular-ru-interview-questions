<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <title>{{ title }}</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
        />
        <meta
            name="description"
            content="{{ description }}"
        />
        <link
            rel="stylesheet"
            href="{{ stylesHref }}"
        />
    </head>
    <body>
        <header class="site-header">
            <div class="container header-layout">
                <a
                    class="brand"
                    href="{{ homeHref }}"
                >
                    Angular RU Interview Questions
                </a>
                <nav
                    class="nav"
                    aria-label="Основная навигация"
                >
                    <a href="{{ questionsHref }}">Вопросы</a>
                    <a href="{{ examplesHref }}">Примеры</a>
                    <a href="https://github.com/Angular-RU/angular-ru-interview-questions">GitHub</a>
                </nav>
            </div>
        </header>
        <main class="container page-layout">
            <article class="markdown">
                <p class="category-label">{{ category }}</p>
                {{ content }}
            </article>
        </main>
    </body>
</html>
