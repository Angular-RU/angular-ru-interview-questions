<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <title>CSS Grid</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
        />
        <style>
            body {
                margin: 0;
                min-block-size: 100vh;
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    sans-serif;
                color: #172033;
                background: #f6f8fb;
            }

            main {
                inline-size: min(920px, calc(100% - 32px));
                margin-inline: auto;
                padding-block: 48px;
            }

            h1 {
                margin-block: 0 12px;
                font-size: 42px;
                line-height: 1.05;
            }

            p {
                max-inline-size: 720px;
                margin-block: 0 28px;
                color: #5d687a;
                font-size: 18px;
                line-height: 1.6;
            }

            ul {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 12px;
                margin: 0;
                padding: 0;
                list-style: none;
            }

            a {
                display: block;
                border: 1px solid #d8dee8;
                border-radius: 8px;
                padding: 16px;
                color: inherit;
                background: #fff;
                text-decoration: none;
            }

            a:hover,
            a:focus-visible {
                border-color: #2f6fec;
                outline: none;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>CSS Grid</h1>
            <p>Набор коротких HTML/CSS-примеров по CSS Grid для подготовки к frontend-интервью.</p>
            <ul>
                <li><a href="example1">Example 1</a></li>
                <li><a href="example2">Example 2</a></li>
                <li><a href="example3">Example 3</a></li>
                <li><a href="example4">Example 4</a></li>
                <li><a href="example5">Example 5</a></li>
                <li><a href="example6">Example 6</a></li>
                <li><a href="example7">Example 7</a></li>
                <li><a href="example8">Example 8</a></li>
                <li><a href="example9">Example 9</a></li>
                <li><a href="example10">Example 10</a></li>
                <li><a href="example11">Example 11</a></li>
            </ul>
        </main>
    </body>
</html>
