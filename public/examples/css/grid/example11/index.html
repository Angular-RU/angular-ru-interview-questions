<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Grid</title>
        <link
            rel="stylesheet"
            href="style.css"
        />
    </head>
    <body>
        <header class="shop-header">
            <span>Online Shop</span>
            <nav aria-label="Main navigation">
                <a href="#">Shoes</a>
                <a href="#">About</a>
                <a href="#">Login</a>
            </nav>
        </header>

        <main>
            <section
                class="products-list"
                aria-label="Products"
            >
                <article class="product">
                    <div class="product-image product-image-blue"></div>
                    <h2>Duramo SL 2.0</h2>
                    <p>$56.00</p>
                </article>
                <article class="product">
                    <div class="product-image product-image-white"></div>
                    <h2>Air Force 1 07</h2>
                    <p>$119.00</p>
                </article>
                <article class="product">
                    <div class="product-image product-image-black"></div>
                    <h2>Air Force 1 07</h2>
                    <p>$119.00</p>
                </article>
                <article class="product">
                    <div class="product-image product-image-vertical"></div>
                    <h2>Advantage Base Court Lifestyle</h2>
                    <p>$80.00</p>
                </article>
                <article class="product">
                    <div class="product-image product-image-white"></div>
                    <h2>Court Vision Low</h2>
                    <p>$74.00</p>
                </article>
                <article class="product">
                    <div class="product-image product-image-black"></div>
                    <h2>Grand Court Alpha</h2>
                    <p>$88.00</p>
                </article>
                <article class="product">
                    <div class="product-image product-image-silver"></div>
                    <h2>Air Max 97</h2>
                    <p>$145.00</p>
                </article>
                <article class="product">
                    <div class="product-image product-image-dark"></div>
                    <h2>Air Max Plus</h2>
                    <p>$160.00</p>
                </article>
            </section>
        </main>
    </body>
</html>
