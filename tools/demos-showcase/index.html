<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <title>Angular RU demos</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
        />

        <style>
            :root {
                color-scheme: light;
                --bg: #f6f7f9;
                --card: #ffffff;
                --text: #15171a;
                --muted: #667085;
                --border: #e4e7ec;
                --accent: #1677ff;
                --accent-soft: #eaf3ff;
                --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-block-size: 100vh;
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    sans-serif;
                color: var(--text);
                background:
                    radial-gradient(circle at top left, rgba(22, 119, 255, 0.14), transparent 32rem),
                    linear-gradient(180deg, #ffffff 0%, var(--bg) 38%);
            }

            .page {
                inline-size: min(1120px, calc(100% - 32px));
                margin-inline: auto;
                padding-block: 56px;
            }

            .hero {
                display: grid;
                gap: 16px;
                margin-block-end: 36px;
            }

            .eyebrow {
                inline-size: fit-content;
                border: 1px solid var(--border);
                border-radius: 999px;
                padding: 6px 12px;
                color: var(--muted);
                background: rgba(255, 255, 255, 0.72);
                font-size: 14px;
            }

            h1 {
                margin: 0;
                max-inline-size: 820px;
                font-size: clamp(36px, 7vw, 72px);
                line-height: 0.96;
                letter-spacing: -0.06em;
            }

            .lead {
                margin: 0;
                max-inline-size: 720px;
                color: var(--muted);
                font-size: 18px;
                line-height: 1.6;
            }

            .toolbar {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                align-items: center;
                justify-content: space-between;
                margin-block: 28px;
            }

            .search {
                min-inline-size: min(100%, 360px);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 12px 14px;
                font: inherit;
                background: var(--card);
                outline: none;
            }

            .search:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 4px var(--accent-soft);
            }

            .count {
                color: var(--muted);
                font-size: 14px;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 18px;
            }

            .card {
                display: grid;
                gap: 16px;
                min-block-size: 240px;
                border: 1px solid var(--border);
                border-radius: 24px;
                padding: 22px;
                color: inherit;
                background: rgba(255, 255, 255, 0.86);
                box-shadow: var(--shadow);
                text-decoration: none;
                transition:
                    transform 160ms ease,
                    box-shadow 160ms ease,
                    border-color 160ms ease;
            }

            .card:hover {
                transform: translateY(-3px);
                border-color: rgba(22, 119, 255, 0.42);
                box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
            }

            .card:focus-visible {
                outline: 4px solid var(--accent-soft);
                border-color: var(--accent);
            }

            .card-header {
                display: flex;
                gap: 12px;
                align-items: start;
                justify-content: space-between;
            }

            .category {
                border-radius: 999px;
                padding: 5px 10px;
                color: var(--accent);
                background: var(--accent-soft);
                font-size: 13px;
                font-weight: 600;
            }

            .status {
                color: #027a48;
                font-size: 13px;
                font-weight: 600;
            }

            .card-title {
                margin: 0;
                font-size: 22px;
                line-height: 1.2;
                letter-spacing: -0.03em;
            }

            .card-description {
                margin: 0;
                color: var(--muted);
                line-height: 1.55;
            }

            .tags {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-block-start: auto;
            }

            .tag {
                border: 1px solid var(--border);
                border-radius: 999px;
                padding: 5px 9px;
                color: var(--muted);
                background: #fff;
                font-size: 12px;
            }

            .empty {
                display: none;
                border: 1px dashed var(--border);
                border-radius: 20px;
                padding: 28px;
                color: var(--muted);
                background: rgba(255, 255, 255, 0.72);
            }

            .empty[aria-hidden='false'] {
                display: block;
            }

            footer {
                margin-block-start: 44px;
                color: var(--muted);
                font-size: 14px;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    color-scheme: dark;
                    --bg: #0b0f17;
                    --card: #111827;
                    --text: #f9fafb;
                    --muted: #98a2b3;
                    --border: #263244;
                    --accent: #69a7ff;
                    --accent-soft: rgba(105, 167, 255, 0.16);
                    --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
                }

                body {
                    background:
                        radial-gradient(circle at top left, rgba(105, 167, 255, 0.16), transparent 32rem),
                        linear-gradient(180deg, #111827 0%, var(--bg) 42%);
                }

                .card,
                .search,
                .tag,
                .eyebrow {
                    background: rgba(17, 24, 39, 0.82);
                }

                .status {
                    color: #6ce9a6;
                }
            }
        </style>
    </head>

    <body>
        <main class="page">
            <section class="hero">
                <div class="eyebrow">Angular RU Interview Questions</div>

                <h1>Демки и интерактивные примеры</h1>

                <p class="lead">
                    Витрина примеров для подготовки к интервью: Angular, microfrontends, browser APIs, performance,
                    security и смежные темы.
                </p>
            </section>

            <section
                class="toolbar"
                aria-label="Фильтр демок"
            >
                <input
                    id="search"
                    class="search"
                    type="search"
                    placeholder="Найти демку..."
                    autocomplete="off"
                />

                <div
                    id="count"
                    class="count"
                ></div>
            </section>

            <section
                id="grid"
                class="grid"
                aria-label="Список демок"
            ></section>

            <section
                id="empty"
                class="empty"
                aria-hidden="true"
            >
                Ничего не найдено. Попробуйте другой запрос.
            </section>

            <footer>
                Generated from
                <code>demos.json</code>
            </footer>
        </main>

        <script type="module">
            const grid = document.querySelector('#grid');
            const search = document.querySelector('#search');
            const count = document.querySelector('#count');
            const empty = document.querySelector('#empty');

            const escapeHtml = (value) =>
                String(value).replace(/[&<>"']/g, (char) => {
                    const entities = {
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        '"': '&quot;',
                        "'": '&#039;',
                    };

                    return entities[char];
                });

            const normalize = (value) => String(value).toLowerCase().trim();

            const createCard = (demo) => {
                const tags = demo.tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join('');

                return `
          <a class="card" href="${escapeHtml(demo.href)}">
            <div class="card-header">
              <span class="category">${escapeHtml(demo.category)}</span>
              <span class="status">${escapeHtml(demo.status)}</span>
            </div>

            <h2 class="card-title">${escapeHtml(demo.title)}</h2>

            <p class="card-description">${escapeHtml(demo.description)}</p>

            <div class="tags">${tags}</div>
          </a>
        `;
            };

            const response = await fetch('./demos.json');
            const demos = await response.json();

            const render = () => {
                const query = normalize(search.value);

                const filtered = demos.filter((demo) => {
                    const searchable = normalize(
                        [demo.title, demo.description, demo.category, demo.status, ...demo.tags].join(' '),
                    );

                    return searchable.includes(query);
                });

                grid.innerHTML = filtered.map(createCard).join('');
                count.textContent = `${filtered.length} из ${demos.length}`;

                empty.setAttribute('aria-hidden', String(filtered.length > 0));
            };

            search.addEventListener('input', render);

            render();
        </script>
    </body>
</html>
